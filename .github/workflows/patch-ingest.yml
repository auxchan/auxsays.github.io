name: AUXSAYS Patch Ingestion

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Optional product_id or company_id to ingest"
        required: false
        type: string
      dry_run:
        description: "Fetch and report without writing records"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

concurrency:
  group: auxsays-main-writeback
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      deploy_changed: ${{ steps.commit.outputs.deploy_changed }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ingestion dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Validate ingestion source config
        run: python auxsays/scripts/validate_ingestion_sources.py

      - name: Run enabled patch ingestion
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auxsays/scripts/patch_ingest.py --dry-run
          else
            python auxsays/scripts/patch_ingest.py
          fi

      - name: Run selected patch ingestion
        if: ${{ github.event.inputs.source != '' && github.event.inputs.source != null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            # A selected-source DRY RUN also passes --all so a *staged* (enabled:false) source
            # can be probed read-only for pre-activation source reachability. The --source filter
            # still restricts the run to the one selected product; --all only lifts the enabled
            # gate, and a dry-run writes nothing. The production (write) path below never passes
            # --all, so a disabled source is never ingested to disk.
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}" --all --dry-run
          else
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}"
          fi


      - name: Validate logo assets before commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/validate_logo_assets.py

      - name: Run generated record QA before commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/qa_patch_records.py


      - name: Commit generated patch records (conflict-safe writeback)
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python auxsays/scripts/lib/automation_writeback.py \
            --message "Ingest official patch records" \
            --allow auxsays/_data/patch_ingest_state.json \
            --allow auxsays/updates/generated \
            --site-path auxsays/updates/generated \
            --validate 'python auxsays/scripts/validate_ingestion_sources.py' \
            --validate 'python auxsays/scripts/validate_logo_assets.py' \
            --validate 'python auxsays/scripts/qa_patch_records.py' \
            --max-retries 5 \
            --pages-cmd 'gh workflow run pages.yml --ref main' \
            --pages-max-attempts 3 --pages-backoff 5,15 \
            --deploy-recovery \
            --recovery-site-path auxsays/updates/generated \
            --recovery-commit-grep 'Ingest official patch records'

      - name: Mark dry run as unchanged
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete; no commit or deploy will be performed."
