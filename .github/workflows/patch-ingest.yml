name: AUXSAYS Patch Ingestion

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Optional product_id or company_id to ingest"
        required: false
        type: string
      dry_run:
        description: "Fetch and report without writing records"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

concurrency:
  group: "patch-ingest"
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      deploy_changed: ${{ steps.commit.outputs.deploy_changed }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ingestion dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Validate ingestion source config
        run: python auxsays/scripts/validate_ingestion_sources.py

      - name: Run enabled patch ingestion
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auxsays/scripts/patch_ingest.py --dry-run
          else
            python auxsays/scripts/patch_ingest.py
          fi

      - name: Run selected patch ingestion
        if: ${{ github.event.inputs.source != '' && github.event.inputs.source != null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}" --dry-run
          else
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}"
          fi


      - name: Validate logo assets before commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/validate_logo_assets.py

      - name: Run generated record QA before commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/qa_patch_records.py


      - name: Commit generated patch records
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- auxsays/_data/patch_ingest_state.json auxsays/updates/generated; then
            echo "No durable ingestion changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "deploy_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet -- auxsays/updates/generated; then
            deploy_changed=false
          else
            deploy_changed=true
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/_data/patch_ingest_state.json auxsays/updates/generated
          git commit -m "Ingest official patch records"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "deploy_changed=$deploy_changed" >> "$GITHUB_OUTPUT"

      - name: Mark dry run as unchanged
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete; no commit or deploy will be performed."

      - name: Trigger site deploy
        if: ${{ steps.commit.outputs.deploy_changed == 'true' }}
        run: gh workflow run pages.yml --ref main
