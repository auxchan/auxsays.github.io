name: AUXSAYS Patch Ingestion

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Optional product_id or company_id to ingest"
        required: false
        type: string
      dry_run:
        description: "Fetch and report without writing records"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "patch-ingest-and-pages"
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ingestion dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Validate ingestion source config
        run: python auxsays/scripts/validate_ingestion_sources.py

      - name: Run enabled patch ingestion
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auxsays/scripts/patch_ingest.py --dry-run
          else
            python auxsays/scripts/patch_ingest.py
          fi

      - name: Run selected patch ingestion
        if: ${{ github.event.inputs.source != '' && github.event.inputs.source != null }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}" --dry-run
          else
            python auxsays/scripts/patch_ingest.py --source "${{ github.event.inputs.source }}"
          fi


      - name: Commit generated patch records
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- auxsays/_data/patch_ingest_state.json auxsays/updates/generated; then
            echo "No durable ingestion changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/_data/patch_ingest_state.json auxsays/updates/generated
          git commit -m "Ingest official patch records"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Mark dry run as unchanged
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete; no commit or deploy will be performed."

  build:
    runs-on: ubuntu-latest
    needs: ingest
    if: ${{ needs.ingest.outputs.changed == 'true' }}
    steps:
      - name: Checkout latest main after ingestion commit
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup Node for logo generation
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python for source health snapshot
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install source health dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Install logo generation dependencies
        working-directory: ./auxsays
        run: npm install --no-audit --no-fund

      - name: Generate Patch Feed logos
        working-directory: ./auxsays
        run: npm run generate:patch-logos

      - name: Install image metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl

      - name: Install Bundler and gems
        working-directory: ./auxsays
        run: |
          gem install bundler
          bundle install

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Strip image metadata
        working-directory: ./auxsays
        run: bash scripts/strip_image_metadata.sh assets/img

      - name: Generate source health snapshot
        run: python auxsays/scripts/source_health_snapshot.py

      - name: Build site
        working-directory: ./auxsays
        run: bundle exec jekyll build --trace

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./auxsays/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [ingest, build]
    if: ${{ needs.ingest.outputs.changed == 'true' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
