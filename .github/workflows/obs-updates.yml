name: OBS Update Watch

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obs_updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest OBS release and generate page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python auxsays/scripts/fetch_obs_updates.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add auxsays/updates/generated
            git commit -m "Add OBS update entry"
            git push
          else
            echo "No new OBS updates found."
          fi
