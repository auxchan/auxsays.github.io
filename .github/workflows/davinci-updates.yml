name: DaVinci Resolve Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  davinci-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate / refresh DaVinci update entry
        run: python auxsays/scripts/fetch_davinci_updates.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/updates/generated/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update DaVinci Resolve release entry"
            git push
          fi
