name: DaVinci Resolve Updates Deprecated

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "DaVinci ingestion is disabled until the Blackmagic parser is hardened."
          echo "Use .github/workflows/patch-ingest.yml for the official ingestion framework."
