name: DaVinci Resolve Legacy Manual Runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  davinci-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip PyYAML

      - name: Refresh DaVinci source status through unified updater
        env:
          AUXSAYS_ONLY: blackmagic-davinci
        run: python auxsays/scripts/fetch_software_updates.py

      - name: Commit generated updates
        run: |
          if git diff --quiet; then
            echo "No content changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/_data/patch_state.json auxsays/_data/patch_notifications.json
          git commit -m "Update DaVinci Resolve source status"
          git push
