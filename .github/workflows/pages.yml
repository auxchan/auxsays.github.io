name: Build and Deploy Chirpy Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup Node for logo generation
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python for source health snapshot
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install source health dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Install logo generation dependencies
        working-directory: ./auxsays
        run: npm install --no-audit --no-fund

      - name: Generate Patch Feed logos
        working-directory: ./auxsays
        run: npm run generate:patch-logos

      - name: Install image metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl

      - name: Install Bundler and gems
        working-directory: ./auxsays
        run: |
          gem install bundler
          bundle install

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Strip image metadata
        working-directory: ./auxsays
        run: bash scripts/strip_image_metadata.sh assets/img

      - name: Generate source health snapshot
        run: python auxsays/scripts/source_health_snapshot.py

      - name: Run generated record QA
        run: python auxsays/scripts/qa_patch_records.py

      - name: Build site
        working-directory: ./auxsays
        run: bundle exec jekyll build --trace

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./auxsays/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
