name: Promote DaVinci Verified Calibration Reports

on:
  workflow_dispatch:
    inputs:
      promote:
        description: "Write accepted calibration rows to consensus evidence"
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

concurrency:
  group: auxsays-main-writeback
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Validate verified DaVinci calibration rows
        run: python auxsays/scripts/promote_davinci_verified_reports.py

      - name: Promote verified DaVinci reports
        if: ${{ github.event.inputs.promote == 'true' }}
        run: python auxsays/scripts/promote_davinci_verified_reports.py --write

      - name: Report dry-run only
        if: ${{ github.event.inputs.promote != 'true' }}
        run: echo "Dry-run complete. Re-run with promote=true to write accepted calibration rows."

      - name: Remove transient validation output
        if: ${{ github.event.inputs.promote == 'true' }}
        run: |
          rm -rf auxsays/_site node_modules .jekyll-cache .codex_tmp
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          rm -f auxsays/_data/source_health.yml
          rm -f auxsays/_data/qa_status.json
          rm -f auxsays/_data/consensus_status.json
          rm -f auxsays/_data/patch_ingest_state.json

      - name: Commit material promotion changes (conflict-safe writeback)
        if: ${{ github.event.inputs.promote == 'true' }}
        run: |
          python auxsays/scripts/lib/automation_writeback.py \
            --message "Promote verified DaVinci calibration reports" \
            --allow auxsays/_data/consensus_evidence.yml \
            --allow auxsays/updates/generated/2026-04-14-davinci-resolve-21-public-beta-1.md \
            --validate 'python auxsays/scripts/qa_patch_records.py' \
            --validate 'python auxsays/scripts/audit_consensus_evidence.py' \
            --validate 'python auxsays/scripts/validate_evidence_method_health.py' \
            --max-retries 5 \
            --pages-cmd 'gh workflow run pages.yml --ref main' \
            --pages-max-attempts 3 --pages-backoff 5,15
