name: AUXSAYS Consensus Policy Audit

on:
  workflow_dispatch:
    inputs:
      run_obs_32_1_1_live_revalidation:
        description: "Run read-only OBS 32.1.1 GitHub Issue live revalidation"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install audit dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt
      - name: Live revalidate OBS Studio 32.1.1 GitHub issue evidence
        if: ${{ github.event.inputs.run_obs_32_1_1_live_revalidation == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: >
          python auxsays/scripts/revalidate_consensus_evidence.py
          --evidence-file auxsays/_data/consensus_evidence.yml
          --product obs-studio
          --version 32.1.1
          --summary
          --live-fetch
      - name: Audit consensus metadata
        run: python auxsays/scripts/consensus_refresh.py --json
      - name: Audit generated counts against structured evidence
        run: python auxsays/scripts/audit_consensus_evidence.py --json --strict
