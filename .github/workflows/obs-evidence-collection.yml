name: Patch Evidence Collection

on:
  workflow_dispatch:
    inputs:
      product_id:
        description: "Optional product_id: obs-studio, blackmagic-davinci, adobe-premiere-pro, adobe-acrobat-reader, adobe-acrobat-pro, or microsoft-windows-11"
        required: false
        type: string
      dry_run:
        description: "Fetch and report without writing evidence or records"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: auxsays-main-writeback
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r auxsays/scripts/requirements-ingest.txt

      - name: Collect patch evidence
        env:
          AUXSAYS_ENABLE_WINDOWS_LEARN_QNA_WRITEBACK: "true"
          # Acrobat consensus is activated: its keyless inSided/Algolia discovery method is
          # reachable from GitHub Actions (unlike the CloudFront-blocked /t5 search, Reddit,
          # and the dead Brave key), proven by dry-run on the PR branch. See PR #23.
          AUXSAYS_ENABLE_ACROBAT_CONSENSUS: "true"
        run: |
          args=(--since-days 45 --max-pages 5)

          raw_product_id="${{ github.event.inputs.product_id }}"
          product_id="$(printf '%s' "$raw_product_id" | tr -d '\r' | sed -E 's/^[[:space:]]*product_id:[[:space:]]*//' | xargs)"

          case "$product_id" in
            ""|obs-studio|blackmagic-davinci|adobe-premiere-pro|adobe-acrobat-reader|adobe-acrobat-pro|microsoft-windows-11) ;;
            *)
              echo "::error::Invalid product_id '$product_id'. Use obs-studio, blackmagic-davinci, adobe-premiere-pro, adobe-acrobat-reader, adobe-acrobat-pro, or microsoft-windows-11."
              exit 2
              ;;
          esac

          if [ "$product_id" != "" ]; then
            args+=(--product-id "$product_id")
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--write)
          fi

          python auxsays/scripts/run_patch_evidence_collection.py "${args[@]}"

      - name: Build consensus status
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/build_consensus_from_evidence.py

      - name: QA patch records
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/qa_patch_records.py

      - name: Audit consensus evidence
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python auxsays/scripts/audit_consensus_evidence.py

      - name: Remove transient validation output
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          rm -rf auxsays/_site node_modules .jekyll-cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          rm -f auxsays/_data/source_health.yml
          rm -f auxsays/_data/qa_status.json
          rm -f auxsays/_data/consensus_status.json
          rm -f auxsays/_data/patch_ingest_state.json

      - name: Commit material evidence changes
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/_data/consensus_evidence.yml auxsays/_data/evidence_method_health.yml auxsays/updates/generated/*obs-studio*.md auxsays/updates/generated/*davinci*.md auxsays/updates/generated/*premiere-pro*.md auxsays/updates/generated/*windows-11*.md auxsays/updates/generated/*acrobat*.md
          if git diff --cached --quiet; then
            echo "No material evidence changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update automated patch evidence"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: ${{ steps.commit.outputs.changed == 'true' }}
        run: gh workflow run pages.yml --ref main
