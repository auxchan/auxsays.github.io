name: Software Patch Intelligence

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Optional comma-separated source id(s), e.g. obs-studio,comfyui"
        required: false
        default: ""
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: software-patch-intelligence
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip PyYAML

      - name: Generate software update intelligence
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AUXSAYS_ONLY: ${{ github.event.inputs.only }}
        run: python auxsays/scripts/fetch_software_updates.py

      - name: Commit generated updates
        run: |
          if git diff --quiet; then
            echo "No content changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auxsays/updates/generated auxsays/_data/patch_state.json auxsays/_data/patch_notifications.json
          git commit -m "Update software patch intelligence"
          git push
