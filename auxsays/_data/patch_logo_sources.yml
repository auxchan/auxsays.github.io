# Approved logo registry for AUXSAYS patch intelligence.
#
# This file is intentionally explicit. The logo generator must not guess from
# product names or individual tokens, because that can mis-map products such as
# "Windows 11" to unrelated brands that contain "11".
#
# Supported source types:
# - simple_icons: exact Simple Icons slug lookup only, in listed order
# - alias: copy/generate the approved logo for another registry ID
# - manual: leave the committed file in place and report it as manually managed
#
# Product names, logos, and brands remain property of their respective owners.
# AUXSAYS uses these marks only for product identification in an independent
# compatibility/update reference context.
