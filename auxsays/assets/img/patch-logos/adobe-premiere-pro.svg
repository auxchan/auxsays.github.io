<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Premiere Pro product icon">
  <defs>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25245f"/>
      <stop offset="0.55" stop-color="#171340"/>
      <stop offset="1" stop-color="#0c0a22"/>
    </linearGradient>
    <linearGradient id="pr-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9999ff"/>
      <stop offset="1" stop-color="#5f7dff"/>
    </linearGradient>
    <filter id="pr-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="6" y="6" width="84" height="84" rx="18" fill="url(#pr-bg)" stroke="url(#pr-edge)" stroke-width="3"/>
  <rect x="12" y="12" width="72" height="72" rx="14" fill="none" stroke="#b4b4ff" stroke-opacity="0.18"/>
  <text x="48" y="59" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" letter-spacing="-1.5" fill="#d8d7ff" filter="url(#pr-glow)">Pr</text>
</svg>
