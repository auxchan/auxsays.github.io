lang: en

# The language of the webpage → http://www.lingoes.net/en/translator/langcode.htm

timezone: America/Los_Angeles

title: AUXSAYS

tagline: Tactical knowledge for creators who want control

description: >-
  Tactical knowledge for creators who want control. Real free AI tools,
  creator workflows, automation productivity, and LMS training systems.

url: "https://auxsays.com"
baseurl: ""

github:
  username: auxchan

social:
  name: Aux
  email: ""
  links: []

avatar: "/assets/img/aux-about-portrait-hero.jpg"

theme: jekyll-theme-chirpy

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-include-cache

paginate: 8
permalink: /articles/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  -
    scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comments: false
      toc: true

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
