<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/jekyll-theme-chirpy.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/auxsays-custom.css' | relative_url }}">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script defer src="{{ '/assets/js/auxsays.js' | relative_url }}"></script>
  </head>
  <body class="aux-page {{ page.layout }}">
    <div class="aux-bg"></div>
    <header class="aux-topbar">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">A</span>
        <span class="brand-copy"><strong>{{ site.title }}</strong><em>{{ site.tagline }}</em></span>
      </a>
      <nav class="aux-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="is-active"{% endif %}>Home</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="is-active"{% endif %}>About Aux</a>
        <a href="{{ '/articles/' | relative_url }}" {% if page.url contains '/articles/' %}class="is-active"{% endif %}>Articles</a>
      </nav>
    </header>
    <main class="aux-shell">
      {{ content }}
    </main>
    <footer class="aux-footer">
      <span>© {{ site.time | date: '%Y' }} {{ site.title }}.</span>
      <span>Home • About Aux • Articles</span>
    </footer>
  </body>
</html>
