<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/jekyll-theme-chirpy.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/auxsays-custom.css' | relative_url }}">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script defer src="{{ '/assets/js/auxsays.js' | relative_url }}"></script>
  </head>
  <body class="aux-page {{ page.layout }}">
    <div class="aux-bg" aria-hidden="true"></div>

    <div class="systems-field" aria-hidden="true">
      <div class="systems-lottie" id="systems-lottie"></div>
      <div class="systems-rings">
        <span class="systems-ring systems-ring--1"></span>
        <span class="systems-ring systems-ring--2"></span>
        <span class="systems-ring systems-ring--3"></span>
      </div>
      <div class="systems-grid"></div>
      <div class="systems-particles systems-particles--bg" id="systems-particles-bg"></div>
      <div class="systems-particles systems-particles--fg" id="systems-particles-fg"></div>
    </div>

    <header class="aux-topbar">
      <div class="aux-topbar-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-copy">
            <strong>{{ site.title }}</strong>
            <em>{{ site.tagline }}</em>
          </span>
        </a>

        <nav class="aux-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="is-active"{% endif %}>Home</a>
          <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="is-active"{% endif %}>About Aux</a>
          <a href="{{ '/articles/' | relative_url }}" {% if page.url contains '/articles/' or page.layout == 'aux-post' %}class="is-active"{% endif %}>Articles</a>
          <a href="{{ '/updates/' | relative_url }}" {% if page.url contains '/updates/' or page.layout == 'aux-update' or page.layout == 'aux-updates' %}class="is-active"{% endif %}>Patch Feed</a>
        </nav>
      </div>
    </header>

    <main class="aux-shell">
      {{ content }}
    </main>

    <footer class="aux-footer">
      <span>© {{ site.time | date: '%Y' }} {{ site.title }}.</span>
      <span>Signals • Systems • Articles • Updates</span>
    </footer>
  </body>
</html>
